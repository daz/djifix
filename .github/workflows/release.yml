name: Release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v2026-07-05. Defaults to the version in djifix.c."
        required: false
        type: string
  workflow_run:
    workflows:
      - Tag version
    types:
      - completed

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    outputs:
      tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
          elif [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="v$(make version)"
          fi

          git fetch --tags --force

          if ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} does not exist" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    needs: prepare

    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_name: djifix-linux-x86_64
            os: ubuntu-latest
            archive_name: djifix-linux-x86_64.tar.gz
            package_type: tar

          - asset_name: djifix-linux-arm64
            os: ubuntu-24.04-arm
            archive_name: djifix-linux-arm64.tar.gz
            package_type: tar

          - asset_name: djifix-macos-x86_64
            os: macos-15-intel
            archive_name: djifix-macos-x86_64.tar.gz
            package_type: tar

          - asset_name: djifix-macos-arm64
            os: macos-latest
            archive_name: djifix-macos-arm64.tar.gz
            package_type: tar

          - asset_name: djifix-windows-x86_64
            os: windows-latest
            archive_name: djifix-windows-x86_64.zip
            package_type: zip
            msvc_arch: x64

          - asset_name: djifix-windows-arm64
            os: windows-11-arm
            archive_name: djifix-windows-arm64.zip
            package_type: zip
            msvc_arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Build Unix binary
        if: runner.os != 'Windows'
        run: make

      - name: Build Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: cl /O2 /Fe:djifix.exe djifix.c

      - name: Package Unix binary
        if: matrix.package_type == 'tar'
        shell: bash
        run: |
          mkdir "${{ matrix.asset_name }}"
          cp djifix README.md LICENSE "${{ matrix.asset_name }}/"
          tar -czf "${{ matrix.archive_name }}" "${{ matrix.asset_name }}"

      - name: Package Windows binary
        if: matrix.package_type == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "${{ matrix.asset_name }}"
          Copy-Item -Path djifix.exe,README.md,LICENSE -Destination "${{ matrix.asset_name }}"
          Compress-Archive -Path "${{ matrix.asset_name }}" -DestinationPath "${{ matrix.archive_name }}"

      - name: Upload binary archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build

    steps:
      - name: Download binary archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: dist/*
